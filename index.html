<script>
  // 1. 본인의 GitHub 정보
  const USERNAME = "930810";
  const REPO = "HY_0_0";

  async function loadFileList() {
    const menuContainer = document.getElementById('dynamicMenu');
    try {
      // 수정 1: pages 폴더 대신 최상위(루트) 경로의 파일 목록을 가져오기
      const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
      
      // 권한 문제나 폴더가 없을 경우의 에러 처리
      if (!response.ok) {
        // 수정 2: 에러 메시지 변경
        throw new Error(`데이터를 불러올 수 없습니다. (상태 코드: ${response.status})<br><br>1. 레포지토리가 Public인지 확인해주세요.`);
      }

      const files = await response.json();

      if (!Array.isArray(files)) {
        throw new Error('파일 목록 형식이 올바르지 않습니다.');
      }

      // HTML 파일만 필터링 (index.html은 메뉴에서 제외)
      const htmlFiles = files.filter(file => 
        file.name.endsWith('.html') && file.name !== 'index.html'
      );

      if (htmlFiles.length === 0) {
        // 수정 3: 빈 화면 안내 메시지 변경
        menuContainer.innerHTML = '<div class="loading">표시할 HTML 문서가 없습니다.</div>';
        return;
      }

      menuContainer.innerHTML = ''; // 로딩 메시지 제거

      htmlFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = `nav-item ${index === 0 ? 'active' : ''}`;
        
        // 메뉴에 보여질 이름 변경 (확장자 제거 및 언더바를 공백으로)
        const displayName = file.name.replace('.html', '').replace(/_/g, ' ');
        
        div.innerHTML = `<span>${displayName}</span>`;
        
        // 클릭 시 iframe 주소를 전체 경로(file.path)로 변경
        div.onclick = () => changePage(div, file.path);
        menuContainer.appendChild(div);

        // 첫 번째 파일을 초기 화면으로 설정 (전체 경로 사용)
        if (index === 0) {
          document.getElementById('contentFrame').src = file.path;
        }
      });
    } catch (error) {
      // 에러 발생 시 사이드바에 원인 출력
      menuContainer.innerHTML = `<div class="loading" style="color: #ef4444; text-align: left;">[오류 발생]<br>${error.message}</div>`;
      console.error(error);
    }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function changePage(el, url) {
    document.getElementById('contentFrame').src = url;
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    if (window.innerWidth <= 768) toggleSidebar();
  }

  // 초기 실행
  loadFileList();
</script>
